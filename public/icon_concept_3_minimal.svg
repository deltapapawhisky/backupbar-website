<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 3: Minimal Time Machine Style LED - GREEN VERSION -->
  <!-- Inspired by Apple's Time Machine aesthetic -->
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="50%" style="stop-color:#0F2744"/>
      <stop offset="100%" style="stop-color:#0A1929"/>
    </linearGradient>
    <radialGradient id="bigLed" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#90EE90"/>
      <stop offset="25%" style="stop-color:#4ADE4A"/>
      <stop offset="50%" style="stop-color:#22C55E"/>
      <stop offset="75%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </radialGradient>
    <radialGradient id="ledGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ADE4A;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#22C55E;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - deep space blue -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="url(#bgGrad3)"/>

  <!-- Subtle concentric rings (time machine style) - now green tinted -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="rgba(34,197,94,0.1)" stroke-width="2"/>
  <circle cx="512" cy="512" r="350" fill="none" stroke="rgba(34,197,94,0.15)" stroke-width="2"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="rgba(34,197,94,0.2)" stroke-width="3"/>
  <circle cx="512" cy="512" r="210" fill="none" stroke="rgba(34,197,94,0.25)" stroke-width="3"/>

  <!-- Outer glow -->
  <circle cx="512" cy="512" r="180" fill="url(#ledGlow3)"/>

  <!-- Main LED - large and prominent GREEN -->
  <circle cx="512" cy="512" r="140" fill="url(#bigLed)" filter="url(#glow3)"/>

  <!-- Inner highlight -->
  <circle cx="470" cy="470" r="50" fill="rgba(255,255,255,0.35)"/>
  <circle cx="485" cy="485" r="25" fill="rgba(255,255,255,0.2)"/>

  <!-- Small decorative stars -->
  <circle cx="180" cy="200" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="850" cy="150" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="800" cy="800" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="220" cy="750" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="150" cy="500" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="880" cy="450" r="4" fill="rgba(255,255,255,0.5)"/>
</svg>
